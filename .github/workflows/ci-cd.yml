name: CI/CD - Portfolio Repte 2

# El workflow s'activa cada vegada que fas 'git push' a la branca 'main'
on:
  push:
    branches: [ main ]

jobs:
  # -----------------------------------------------
  # JOB 1: Comprovar que el codi no té errors bàsics
  # -----------------------------------------------
  lint:
    name: Linting (Validació de codi)
    runs-on: ubuntu-latest
    steps:
      - name: Descarregar el codi del repositori
        uses: actions/checkout@v4

      - name: Instal·lar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instal·lar eines de linting
        run: npm install -g htmlhint

      - name: Comprovar l'HTML (HTMLHint)
        run: htmlhint "src/**/*.html"

  # -----------------------------------------------
  # JOB 2: Desplegar la infraestructura amb Terraform
  # -----------------------------------------------
  deploy:
    name: Desplegament amb Terraform
    runs-on: ubuntu-latest
    needs: lint  # Només s'executa si el job de linting ha passat correctament
    
    steps:
      - name: Descarregar el codi del repositori
        uses: actions/checkout@v4

      - name: Configurar les credencials d'AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Instal·lar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Inicialitzar)
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan (Veure els canvis)
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply (Aplicar els canvis)
        working-directory: terraform
        run: terraform apply -auto-approve
